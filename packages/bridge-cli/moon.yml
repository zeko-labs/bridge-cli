# yaml-language-server: $schema=../../.moon/cache/schemas/project.json

layer: tool
dependsOn:
  - networks
fileGroups:
  src:
    - src/**/*
    - tests/**/*
    - README.md
    - TESTING.md
    - AGENTS.md
    - CLAUDE.md
    - .env.example
    - scripts/**/*
    - moon.yml
    - package.json
    - tsconfig.json
    - tsconfig.build.json
    - tsdown.config.ts
    - vitest.config.ts

tasks:
  build:
    command: tsdown
    deps:
      - ^:build
    inputs:
      - "@group(src)"
    outputs:
      - dist/**
  lint:
    command: biome lint --diagnostic-level=error
    inputs:
      - "@group(src)"
  lint-fix:
    command: biome lint --fix --unsafe --diagnostic-level=error
    inputs:
      - "@group(src)"
  typecheck:
    deps:
      - ^:build
    command: tsgo --noEmit --declaration false --declarationMap false --rootDir ../..
    inputs:
      - "@group(src)"
  test:
    deps:
      - bridge-sdk:build
    command: vitest run
    inputs:
      - "@group(src)"
  live-bridge-mina-to-zeko:
    description: Manual real-network validation of the single long-lived bridge command from Mina testnet to Zeko-M testnet.
    deps:
      - build
    command: node ./dist/cli.js bridge --from mina:testnet --to zeko-m:testnet --amount 1 --json --verbose
    options:
      cache: false
      runInCI: false
    inputs:
      - "@group(src)"
  live-bridge-zeko-to-mina:
    description: Manual real-network validation of the single long-lived bridge command from Zeko-M testnet to Mina testnet.
    deps:
      - build
    command: node ./dist/cli.js bridge --from zeko-m:testnet --to mina:testnet --amount 1 --json --verbose
    options:
      cache: false
      runInCI: false
    inputs:
      - "@group(src)"
  create-wallet-env:
    description: Create a timestamped root .env.wallet file for isolated live bridge validation.
    command: node ./scripts/create-wallet-env.ts --root ../..
    options:
      cache: false
      runInCI: false
    inputs:
      - scripts/create-wallet-env.ts
